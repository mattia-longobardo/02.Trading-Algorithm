services:
  trading:
    build: .
    container_name: trading
    restart: always
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./run:/app/run
    environment:
      - TZ=Europe/Rome
    networks:
      - projects

  log-viewer:
    image: halverneus/static-file-server:latest
    container_name: log-viewer
    restart: unless-stopped
    volumes:
      - ./logs:/srv
    networks:
      - proxy-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy_public"
      - "traefik.http.routers.log-viewer-router.rule=Host(`trading.local`)"
      - "traefik.http.routers.log-viewer-router.entrypoints=web"
      - "traefik.http.services.log-viewer-service.loadbalancer.server.port=80"

networks:
  projects:
    external: true
  proxy-public:
    external: true