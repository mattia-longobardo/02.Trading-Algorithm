# Default di configurazione. Precedenza a runtime: app_settings (DB) > questo file > env.
# Le chiavi API vivono SOLO in .env, mai qui.
environment: demo          # demo | real
schedule_utc: "08:30"      # SEMPRE UTC: lo scheduler non usa `timezone`
timezone: Europe/Rome      # solo presentazione: orari mostrati in questo fuso
currency: USD              # valuta di visualizzazione; i dati restano in USD
news_fetch_utc: "08:15"
weekdays_only: true
risk_free_rate_pct: 5.0    # T-bill 3M, usato da Sharpe/Sortino
benchmark_symbol: SPY

watchlist:
  - AAPL
  - MSFT
  - NVDA
  - GOOGL
  - AMZN
  - META
  - TSLA
  - JPM
  - V
  - UNH
  - XOM
  - SPY
  - QQQ

max_candidates_per_run: 6
debate_rounds: 2

# Scoperta dinamica dell'universo: uno scout LLM legge le news del giorno e
# propone candidati (con tesi e confidence); le citazioni esplicite nelle news
# corroborano il punteggio e fanno da fallback se l'LLM non è disponibile.
# Ogni candidato deve superare uno screening di affidabilità deterministico
# (prezzo, storico, liquidità, volatilità, spread). Si sommano alla watchlist.
universe_discovery:
  enabled: true
  mode: llm                          # llm (scout + fallback regex) | regex
  size: 5                            # titoli dinamici oltre alla watchlist
  llm_max_proposals: 10              # tetto alle proposte dello scout
  min_confidence: 0.5                # confidence minima di una proposta
  keep_misses: 3                     # refresh senza riconferma prima di uscire
  min_mentions: 2                    # item news distinti per candidarsi (regex)
  max_evaluated: 20                  # candidati ammessi allo screening
  min_price_usd: 5.0                 # niente penny stock
  min_history_days: 120              # niente IPO fresche
  min_avg_dollar_volume_usd: 20000000
  max_annualized_vol_pct: 60
  max_spread_pct: 1.0
  news_half_life_days: 3.0           # peso citazioni: dimezza ogni 3 giorni

knowledge:
  news_half_life_days: 7.0           # in ricerca le news dimezzano peso ogni 7g
  news_max_age_days: 45              # oltre: eliminate dalla KB (i documenti restano)
  ticker_memory:
    enabled: true
    retention_days: 30               # le notizie escono dalla memoria dopo 30g
    max_entries: 40
    use_llm: true                    # sintesi evolutiva via LLM (fallback: headline)

llm:
  model: gpt-5.6-terra
  max_tokens: 2048

news_feeds:
  generic:
    - https://feeds.content.dowjones.io/public/rss/mw_topstories
    - https://www.cnbc.com/id/100003114/device/rss/rss.html
    # Fintech e mercati tech (contesto per analista sentiment/macro)
    - https://techcrunch.com/category/fintech/feed/
    - https://www.cnbc.com/id/19854910/device/rss/rss.html   # CNBC Technology
    # Avanzamento tecnologico generale (scoperte, ricerca, prodotto)
    - https://techcrunch.com/feed/
    - https://www.technologyreview.com/feed/                  # MIT Technology Review
    - https://www.wired.com/feed/rss
    - https://feeds.arstechnica.com/arstechnica/index
    - https://hnrss.org/frontpage                             # Hacker News, prima pagina
    # Mercati e macro (utili, economia, flash di mercato)
    - https://www.cnbc.com/id/20910258/device/rss/rss.html    # CNBC Economy
    - https://www.cnbc.com/id/15839135/device/rss/rss.html    # CNBC Earnings
    - https://feeds.content.dowjones.io/public/rss/mw_marketpulse
    # Finanza e banche
    - https://www.cnbc.com/id/10000664/device/rss/rss.html    # CNBC Finance
    - https://www.bankingdive.com/feeds/news/
    # Energia, utility e materie prime
    - https://www.cnbc.com/id/19836768/device/rss/rss.html    # CNBC Energy
    - https://oilprice.com/rss/main
    - https://www.utilitydive.com/feeds/news/
    - https://www.mining.com/feed/
    # Salute, pharma e biotech
    - https://www.cnbc.com/id/10000108/device/rss/rss.html    # CNBC Health Care
    - https://www.fiercepharma.com/rss/xml
    - https://www.fiercebiotech.com/rss/xml
    # Industria e difesa
    - https://www.defensenews.com/arc/outboundfeeds/rss/?outputType=xml
    # Consumo e retail
    - https://www.retaildive.com/feeds/news/
  per_ticker:
    - "https://feeds.finance.yahoo.com/rss/2.0/headline?s={ticker}&region=US&lang=en-US"
