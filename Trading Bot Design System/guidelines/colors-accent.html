<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;padding:20px;background:var(--background)}</style></head><body><div style="display:flex;gap:12px"><div style="flex:1;min-width:100px"><div style="height:56px;background:var(--primary);border:1px solid var(--border);border-radius:4px"></div><div style="font-family:var(--font-mono);font-size:11px;margin-top:6px;color:var(--foreground)">primary · #2440B3</div><div style="font-family:var(--font-mono);font-size:10px;color:var(--muted-foreground)">--primary</div></div><div style="flex:1;min-width:100px"><div style="height:56px;background:var(--accent);border:1px solid var(--border);border-radius:4px"></div><div style="font-family:var(--font-mono);font-size:11px;margin-top:6px;color:var(--foreground)">accent (velo hover)</div><div style="font-family:var(--font-mono);font-size:10px;color:var(--muted-foreground)">--accent</div></div><div style="flex:1;min-width:100px"><div style="height:56px;background:var(--accent-foreground);border:1px solid var(--border);border-radius:4px"></div><div style="font-family:var(--font-mono);font-size:11px;margin-top:6px;color:var(--foreground)">accent-foreground</div><div style="font-family:var(--font-mono);font-size:10px;color:var(--muted-foreground)">--accent-foreground</div></div><div style="flex:1;min-width:100px"><div style="height:56px;background:var(--ring);border:1px solid var(--border);border-radius:4px"></div><div style="font-family:var(--font-mono);font-size:11px;margin-top:6px;color:var(--foreground)">ring (focus)</div><div style="font-family:var(--font-mono);font-size:10px;color:var(--muted-foreground)">--ring</div></div></div></body></html>
