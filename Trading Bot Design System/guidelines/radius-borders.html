<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;padding:20px;background:var(--background)}</style></head><body><div style="display:flex;gap:16px;align-items:flex-start"><div><div style="width:88px;height:56px;background:var(--card);border:1px solid var(--border);border-radius:3px;box-shadow:var(--shadow-xs)"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--muted-foreground);margin-top:6px">--radius-sm · 3px</div></div><div><div style="width:88px;height:56px;background:var(--card);border:1px solid var(--border);border-radius:4px;box-shadow:var(--shadow-xs)"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--muted-foreground);margin-top:6px">--radius-md · 4px</div></div><div><div style="width:88px;height:56px;background:var(--card);border:1px solid var(--border);border-radius:6px;box-shadow:var(--shadow-xs)"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--muted-foreground);margin-top:6px">--radius-lg · 6px</div></div><div><div style="width:88px;height:56px;background:var(--card);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow-xs)"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--muted-foreground);margin-top:6px">--radius-max · 8px</div></div><div style="font-family:var(--font-sans);font-size:12px;color:var(--muted-foreground);max-width:220px">Hairline 1px ovunque: è il mezzo strutturale. Niente pill, niente ombre morbide.</div></div></body></html>
